<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traditional Identity</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="quest-hud">
    <h3 id="quest-title"></h3>
    <p id="quest-desc"></p>
    </div>

    <div id="quiz-modal" style="display: none;">
        <h2 id="quiz-question"></h2>
        <div id="quiz-options"></div>
    </div>

    <!-- Status Bar - Thanh màu đã thu thập -->
    <div id="status-bar">
        <div class="color-slot" id="slot-0"></div>
        <div class="color-slot" id="slot-1"></div>
        <div class="color-slot" id="slot-2"></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>To Color Your World</h1>
        <button onclick="window.game?.start()">Bắt đầu phiêu lưu</button>
    </div>

    <!-- Death Screen -->
    <div id="death-screen" class="overlay" style="display: none;">
        <h2>Ký ức bị đứt đoạn...</h2>
        <p>Bạn có muốn bắt đầu lại?</p>
        <div class="button-group">
            <button onclick="window.game?.respawn(true)">Có</button>
            <button onclick="window.game?.respawn(false)">Không</button>
        </div>
    </div>

    <!-- Puzzle Overlay -->
    <div id="puzzle-overlay" class="overlay" style="display: none;">
        <h2>Mảnh Ghép Ký Ức</h2>
        <p id="puzzle-text">Bạn đã tìm thấy một màu sắc cổ xưa...</p>
        <button onclick="window.game?.solvePuzzle()">Giải Mã Ký Ức</button>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
